<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lawson's Landing — Site Finder</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07080d;
  --surface: #11151f;
  --surface-2: #1a1f2e;
  --border: #2a3142;
  --border-strong: #3a4358;
  --text: #e8ecf3;
  --text-muted: #7a8599;
  --text-dim: #4a5468;

  --alarm: #ff2e55;
  --alarm-dim: rgba(255, 46, 85, 0.15);
  --signal: #00d9ff;
  --signal-dim: rgba(0, 217, 255, 0.18);
  --found: #5eff8a;
  --found-dim: rgba(94, 255, 138, 0.15);
  --amber: #ffb84a;

  --meadow: #ff6b9d;
  --marsh: #4ad6ff;
  --marine: #ffc83d;

  --grid: rgba(255, 255, 255, 0.03);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 14px;
  letter-spacing: 0.01em;
  user-select: none;
  -webkit-user-select: none;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 0% 0%, rgba(0, 217, 255, 0.04) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(255, 46, 85, 0.03) 0%, transparent 40%),
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
}

/* ============ HEADER ============ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(7, 8, 13, 0.85);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  padding-top: max(10px, env(safe-area-inset-top));
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.brand-mark {
  width: 18px; height: 18px;
  border: 2px solid var(--alarm);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.brand-mark::before {
  content: '';
  position: absolute;
  inset: 4px;
  background: var(--alarm);
  border-radius: 50%;
  animation: pulse-mark 2s ease-in-out infinite;
}
@keyframes pulse-mark {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.brand-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.08em;
  line-height: 1;
  color: var(--text);
}
.brand-sub {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--found);
  text-transform: uppercase;
}
.status::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--found);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--found);
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

/* ============ SEARCH BAR ============ */
.search-zone {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  background: rgba(7, 8, 13, 0.75);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}
.search-input-wrap {
  position: relative;
  display: flex;
  gap: 8px;
}
.search-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 14px 16px 14px 46px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
  outline: none;
  transition: all 0.15s ease;
  -webkit-appearance: none;
}
.search-input::placeholder {
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.1em;
  font-size: 14px;
}
.search-input:focus {
  border-color: var(--alarm);
  background: var(--surface-2);
  box-shadow: 0 0 0 3px var(--alarm-dim);
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 18px;
}
.gps-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--signal);
  width: 50px;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.gps-btn:active { transform: scale(0.96); }
.gps-btn.active {
  background: var(--signal-dim);
  border-color: var(--signal);
  color: var(--signal);
}

/* Section chips */
.chips {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'JetBrains Mono', monospace;
}
.chip:active { transform: scale(0.96); }
.chip.active {
  background: var(--alarm-dim);
  border-color: var(--alarm);
  color: var(--alarm);
}
.chip-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* ============ MAP ============ */
.map-zone {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #050608;
  touch-action: none;
}
.map-stage {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: 0 0;
  will-change: transform;
}
.map-img {
  display: block;
  width: 4000px;  /* native */
  height: 2479px;
  pointer-events: none;
  -webkit-user-drag: none;
  user-drag: none;
}

/* SVG overlay for markers and amenities */
.map-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 4000px;
  height: 2479px;
  pointer-events: none;
}

/* Target marker: pulsing reticle */
.target {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
.target-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90px; height: 90px;
  border: 3px solid var(--alarm);
  border-radius: 50%;
  animation: pulse-ring 1.6s ease-out infinite;
}
.target-ring:nth-child(2) { animation-delay: 0.55s; }
.target-ring:nth-child(3) { animation-delay: 1.1s; }
@keyframes pulse-ring {
  0% { width: 30px; height: 30px; opacity: 1; border-width: 3px; }
  100% { width: 180px; height: 180px; opacity: 0; border-width: 1px; }
}
.target-core {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  background: var(--alarm);
  border: 3px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 2px var(--alarm), 0 0 18px var(--alarm);
}
.target-cross {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 70px; height: 70px;
  pointer-events: none;
}
.target-cross::before, .target-cross::after {
  content: '';
  position: absolute;
  background: var(--alarm);
  box-shadow: 0 0 6px var(--alarm);
}
.target-cross::before { left: 50%; top: 0; bottom: 0; width: 1px; margin-left: -0.5px; }
.target-cross::after { top: 50%; left: 0; right: 0; height: 1px; margin-top: -0.5px; }

/* GPS user marker */
.gps-marker {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
.gps-pulse {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--signal-dim) 0%, transparent 60%);
  border-radius: 50%;
  animation: gps-pulse 2s ease-out infinite;
}
@keyframes gps-pulse {
  0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.4); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
}
.gps-dot {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px; height: 18px;
  background: var(--signal);
  border: 3px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 14px var(--signal);
}

/* ============ MAP CONTROLS (right side) ============ */
.map-controls {
  position: absolute;
  right: 12px;
  top: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;
}
.map-btn {
  width: 42px; height: 42px;
  background: rgba(17, 21, 31, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.map-btn:active { transform: scale(0.92); background: var(--surface-2); }

/* Compass / coords / zoom display */
.map-hud {
  position: absolute;
  left: 12px;
  top: 12px;
  background: rgba(17, 21, 31, 0.92);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  z-index: 10;
  font-family: 'JetBrains Mono', monospace;
}
.map-hud .v { color: var(--text); font-weight: 700; }

/* ============ INFO PANEL (slides up) ============ */
.info-panel {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, rgba(17, 21, 31, 0.97) 0%, rgba(7, 8, 13, 0.99) 100%);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--alarm);
  padding: 18px 20px 22px;
  padding-bottom: max(22px, env(safe-area-inset-bottom));
  transform: translateY(110%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 20;
  box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.6), 0 0 30px var(--alarm-dim);
}
.info-panel.show { transform: translateY(0); }

.info-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.info-title {
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.info-label {
  font-size: 9px;
  color: var(--alarm);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 700;
}
.info-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  line-height: 0.85;
  color: var(--text);
  letter-spacing: 0.02em;
}
.info-section {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 700;
  margin-top: 4px;
}
.info-close {
  width: 36px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}
.info-cell {
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
}
.info-cell-label {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 4px;
}
.info-cell-val {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}
.info-cell-val .unit {
  color: var(--text-muted);
  font-size: 10px;
  margin-left: 4px;
  letter-spacing: 0.12em;
}

.no-result {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--alarm);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: rgba(7, 8, 13, 0.95);
  padding: 14px 22px;
  border: 1px solid var(--alarm);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  display: none;
  z-index: 100;
  box-shadow: 0 0 30px var(--alarm-dim);
}
.no-result.show { display: block; animation: shake 0.4s ease; }
@keyframes shake {
  0%, 100% { transform: translate(-50%, -50%); }
  25% { transform: translate(calc(-50% - 6px), -50%); }
  75% { transform: translate(calc(-50% + 6px), -50%); }
}

/* Recent searches strip */
.recents {
  display: flex;
  gap: 5px;
  margin-top: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.recents::-webkit-scrollbar { display: none; }
.recent {
  flex-shrink: 0;
  padding: 5px 10px;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.recent:active { background: var(--surface); color: var(--text); }
.recent.empty { display: none; }

/* Loading splash */
#splash {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.4s;
}
#splash.hide { opacity: 0; pointer-events: none; }
.splash-mark {
  width: 60px; height: 60px;
  border: 3px solid var(--alarm);
  border-radius: 50%;
  position: relative;
  margin-bottom: 18px;
}
.splash-mark::before {
  content: '';
  position: absolute; inset: 8px;
  border: 2px solid var(--alarm);
  border-radius: 50%;
  animation: spin 1.2s linear infinite;
  border-top-color: transparent;
  border-right-color: transparent;
}
@keyframes spin { to { transform: rotate(360deg); } }
.splash-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.15em;
  color: var(--text);
}
.splash-sub {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.3em;
  margin-top: 4px;
  text-transform: uppercase;
}

/* Scale corners on screen */
.scan-corners {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}
.scan-corners::before, .scan-corners::after,
.corner-tr, .corner-br {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border: 1.5px solid var(--alarm);
}
.scan-corners::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
.scan-corners::after { bottom: 6px; left: 6px; border-right: none; border-top: none; }
.corner-tr { top: 6px; right: 6px; border-left: none; border-bottom: none; position: absolute; }
.corner-br { bottom: 6px; right: 6px; border-left: none; border-top: none; position: absolute; }

@media (max-width: 480px) {
  .brand-title { font-size: 18px; }
  .brand-sub { display: none; }
  .info-num { font-size: 48px; }
  .map-controls { right: 8px; top: 8px; }
  .map-hud { left: 8px; top: 8px; padding: 6px 10px; }
}

/* prevent iOS zoom on input focus */
@supports (-webkit-touch-callout: none) {
  .search-input { font-size: 22px; }
}

/* Subtle scanline texture in map area for sci-fi feel */
.map-zone::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0,
    transparent 3px,
    rgba(255, 255, 255, 0.008) 3px,
    rgba(255, 255, 255, 0.008) 4px
  );
  z-index: 1;
}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-mark"></div>
  <div class="splash-text">LAWSON'S LANDING</div>
  <div class="splash-sub">SITE FINDER · INITIALIZING</div>
</div>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <div class="brand-title">SITE FINDER</div>
      <div class="brand-sub">Lawson's Landing · Tomales Bay</div>
    </div>
  </div>
  <div class="status">OFFLINE READY</div>
</header>

<div class="search-zone">
  <div class="search-input-wrap">
    <span class="search-icon">⊙</span>
    <input
      class="search-input"
      id="searchInput"
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="ENTER SITE #"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      maxlength="4"
    />
    <button class="gps-btn" id="gpsBtn" title="Toggle GPS">⌖</button>
  </div>
  <div class="chips" id="chips">
    <div class="chip active" data-section="ALL">ALL <span style="opacity:0.6">336</span></div>
    <div class="chip" data-section="M"><span class="chip-dot" style="background:var(--meadow)"></span>MEADOW</div>
    <div class="chip" data-section="A"><span class="chip-dot" style="background:var(--marsh)"></span>MARSH</div>
    <div class="chip" data-section="R"><span class="chip-dot" style="background:var(--marine)"></span>MARINE</div>
  </div>
  <div class="recents" id="recents"></div>
</div>

<div class="map-zone" id="mapZone">
  <div class="scan-corners">
    <div class="corner-tr"></div>
    <div class="corner-br"></div>
  </div>
  <div class="map-stage" id="mapStage">
    <img class="map-img" id="mapImg" alt="Lawson's Landing campground map" draggable="false">
    <svg class="map-overlay" id="mapOverlay" viewBox="0 0 4000 2479"></svg>
  </div>

  <div class="map-hud" id="hud">
    <div>ZOOM <span class="v" id="zoomDisp">1.0×</span></div>
  </div>

  <div class="map-controls">
    <button class="map-btn" id="zoomIn">+</button>
    <button class="map-btn" id="zoomOut">−</button>
    <button class="map-btn" id="reset">⟲</button>
  </div>

  <div class="no-result" id="noResult">SITE NOT FOUND</div>
</div>

<div class="info-panel" id="infoPanel">
  <div class="info-head">
    <div class="info-title">
      <div>
        <div class="info-label">TARGET ACQUIRED</div>
        <div class="info-num" id="iNum">000</div>
        <div class="info-section" id="iSection">—</div>
      </div>
    </div>
    <button class="info-close" id="iClose">✕</button>
  </div>
  <div class="info-grid">
    <div class="info-cell">
      <div class="info-cell-label">Nearest Restroom</div>
      <div class="info-cell-val" id="iRest">— <span class="unit">M</span></div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Nearest Water</div>
      <div class="info-cell-val" id="iWater">— <span class="unit">M</span></div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Map Coords</div>
      <div class="info-cell-val" id="iCoords">—</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Status</div>
      <div class="info-cell-val" id="iStatus" style="color:var(--found)">LOCATED</div>
    </div>
  </div>
</div>

<script>
/* ============ DATA ============ */

// Sites: { num: [x, y, sectionCode] }  (M=Meadow, A=Marsh, R=Marine)
let SITES = {}; // loaded from sites.json

const SECTION_NAMES = { M: 'Meadow View', A: 'Marsh View', R: 'Marine View' };
const SECTION_COLORS = { M: '#ff6b9d', A: '#4ad6ff', R: '#ffc83d' };

// Amenities (approximate from map)
const AMENITIES = {
  restrooms: [
    [220, 1505, 'M'], [650, 1430, 'M'], [1095, 1665, 'M'], [1370, 1490, 'M'],
    [2710, 1690, 'A'],
    [3805, 1370, 'R'], [3500, 1535, 'R'], [3815, 700, 'R'], [3815, 415, 'R'], [3815, 110, 'R'],
    [3835, 1180, 'R']
  ],
  water: [
    [640, 1420, 'M'], [1450, 1490, 'M'], [2715, 1690, 'A'],
    [3325, 1395, 'R'], [3815, 530, 'R']
  ],
  store: [3825, 1290, 'R'],
  campHost: [3115, 1735, 'R'],
  boatLaunch: [3905, 1290, 'R'],
  dump: [1625, 1490, 'M'],
  entrance: [70, 1450, 'M']
};

const MAP_W = 4000, MAP_H = 2479;

// Approx. real-world bounds for GPS overlay (calibrate with field testing!)
// Lawson's Landing area, Dillon Beach CA
const GEO_BOUNDS = {
  // Map's NW corner -> SE corner (lat, lng)
  // These are APPROXIMATE — must be calibrated by walking known-position site.
  nw: [38.2360, -122.9790],
  se: [38.2275, -122.9655]
};

/* ============ STATE ============ */
let scale = 1;
let tx = 0, ty = 0;
let activeSection = 'ALL';
let target = null;     // {num, x, y, code}
let gpsActive = false;
let gpsPos = null;     // {x, y, accuracy_m}
let gpsWatchId = null;
let recents = [];

const stage = document.getElementById('mapStage');
const zone = document.getElementById('mapZone');
const overlay = document.getElementById('mapOverlay');
const input = document.getElementById('searchInput');
const noResult = document.getElementById('noResult');
const infoPanel = document.getElementById('infoPanel');

/* ============ MAP IMG (loaded from base64) ============ */
const mapImg = document.getElementById('mapImg');
mapImg.src = 'map.jpg';
mapImg.onload = () => {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    fitToScreen();
  }, 300);
};
mapImg.onerror = () => {
  document.getElementById('splash').classList.add('hide');
};

/* ============ TRANSFORM ============ */
function applyTransform() {
  stage.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  document.getElementById('zoomDisp').textContent = scale.toFixed(1) + '×';
}

function fitToScreen() {
  const rect = zone.getBoundingClientRect();
  const sx = rect.width / MAP_W;
  const sy = rect.height / MAP_H;
  scale = Math.min(sx, sy) * 0.95;
  tx = (rect.width - MAP_W * scale) / 2;
  ty = (rect.height - MAP_H * scale) / 2;
  applyTransform();
}

function clampPan() {
  const rect = zone.getBoundingClientRect();
  const w = MAP_W * scale, h = MAP_H * scale;
  // Allow some bleed beyond edges
  const margin = 100;
  if (w < rect.width) tx = (rect.width - w) / 2;
  else { tx = Math.min(margin, Math.max(rect.width - w - margin, tx)); }
  if (h < rect.height) ty = (rect.height - h) / 2;
  else { ty = Math.min(margin, Math.max(rect.height - h - margin, ty)); }
}

/* Center map at given map-pixel coordinates with target zoom */
function focusOn(mapX, mapY, targetScale = 2.4, animate = true) {
  const rect = zone.getBoundingClientRect();
  const fromScale = scale, fromTx = tx, fromTy = ty;
  const toScale = targetScale;
  const toTx = rect.width / 2 - mapX * toScale;
  const toTy = rect.height / 2 - mapY * toScale;

  if (!animate) {
    scale = toScale; tx = toTx; ty = toTy;
    clampPan(); applyTransform(); return;
  }

  const start = performance.now();
  const dur = 600;
  function frame(now) {
    const t = Math.min(1, (now - start) / dur);
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    scale = fromScale + (toScale - fromScale) * e;
    tx = fromTx + (toTx - fromTx) * e;
    ty = fromTy + (toTy - fromTy) * e;
    clampPan();
    applyTransform();
    if (t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ============ TOUCH / MOUSE ============ */
let pointers = new Map();
let lastPinchDist = 0;
let lastPinchCenter = null;

zone.addEventListener('pointerdown', (e) => {
  zone.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pointers.size === 2) {
    const pts = [...pointers.values()];
    lastPinchDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    lastPinchCenter = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
  }
});

zone.addEventListener('pointermove', (e) => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1) {
    tx += dx; ty += dy;
    clampPan(); applyTransform();
  } else if (pointers.size === 2) {
    const pts = [...pointers.values()];
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const center = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
    if (lastPinchDist > 0) {
      const factor = dist / lastPinchDist;
      const newScale = Math.max(0.2, Math.min(8, scale * factor));
      const rect = zone.getBoundingClientRect();
      const cx = center.x - rect.left, cy = center.y - rect.top;
      // Zoom around pinch center
      tx = cx - (cx - tx) * (newScale / scale);
      ty = cy - (cy - ty) * (newScale / scale);
      scale = newScale;
      // Pan with center
      if (lastPinchCenter) {
        tx += center.x - lastPinchCenter.x;
        ty += center.y - lastPinchCenter.y;
      }
      clampPan(); applyTransform();
    }
    lastPinchDist = dist;
    lastPinchCenter = center;
  }
});

function endPointer(e) {
  pointers.delete(e.pointerId);
  if (pointers.size < 2) { lastPinchDist = 0; lastPinchCenter = null; }
}
zone.addEventListener('pointerup', endPointer);
zone.addEventListener('pointercancel', endPointer);
zone.addEventListener('pointerleave', endPointer);

// Wheel zoom (desktop)
zone.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = zone.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const newScale = Math.max(0.2, Math.min(8, scale * factor));
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  clampPan(); applyTransform();
}, { passive: false });

document.getElementById('zoomIn').addEventListener('click', () => zoomBy(1.4));
document.getElementById('zoomOut').addEventListener('click', () => zoomBy(0.7));
document.getElementById('reset').addEventListener('click', fitToScreen);

function zoomBy(factor) {
  const rect = zone.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.max(0.2, Math.min(8, scale * factor));
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  clampPan(); applyTransform();
}

/* ============ MARKERS (rendered in SVG overlay) ============ */
function renderOverlay() {
  let html = '';

  // GPS marker
  if (gpsPos) {
    html += `
      <foreignObject x="${gpsPos.x - 100}" y="${gpsPos.y - 100}" width="200" height="200">
        <div xmlns="http://www.w3.org/1999/xhtml" class="gps-marker" style="position:absolute;left:100px;top:100px;">
          <div class="gps-pulse"></div>
          <div class="gps-dot"></div>
        </div>
      </foreignObject>`;
  }

  // Target marker
  if (target) {
    html += `
      <foreignObject x="${target.x - 100}" y="${target.y - 100}" width="200" height="200">
        <div xmlns="http://www.w3.org/1999/xhtml" class="target" style="position:absolute;left:100px;top:100px;">
          <div class="target-cross"></div>
          <div class="target-ring"></div>
          <div class="target-ring"></div>
          <div class="target-ring"></div>
          <div class="target-core"></div>
        </div>
      </foreignObject>`;
  }

  overlay.innerHTML = html;
}

/* ============ SEARCH ============ */
function dist(a, b) { return Math.hypot(a[0] - b[0], a[1] - b[1]); }

// Convert map pixels to estimated meters using map bounds
// rough scale: map width spans approx geography width
function pxToMeters(dx, dy) {
  // Approximate: at 38.23°N, 1° lat ≈ 111000m, 1° lng ≈ 87100m
  const latRange = GEO_BOUNDS.nw[0] - GEO_BOUNDS.se[0];
  const lngRange = GEO_BOUNDS.se[1] - GEO_BOUNDS.nw[1];
  const mPerPxX = (lngRange * 87100) / MAP_W;
  const mPerPxY = (latRange * 111000) / MAP_H;
  return Math.round(Math.hypot(dx * mPerPxX, dy * mPerPxY));
}

function findNearestAmenity(x, y, list) {
  let best = null, bestD = Infinity;
  for (const a of list) {
    const d = dist([x, y], [a[0], a[1]]);
    if (d < bestD) { bestD = d; best = a; }
  }
  return best ? { item: best, pxDist: bestD, mDist: pxToMeters(best[0] - x, best[1] - y) } : null;
}

function compass(dx, dy) {
  const ang = Math.atan2(-dy, dx) * 180 / Math.PI; // -dy because y axis is inverted
  const dirs = ['E','NE','N','NW','W','SW','S','SE'];
  const i = Math.round(((ang + 360) % 360) / 45) % 8;
  return dirs[i];
}

function selectSite(num) {
  const data = SITES[num];
  if (!data) {
    showNoResult(`SITE ${num} NOT FOUND`);
    return;
  }
  const [x, y, code] = data;
  target = { num, x, y, code };

  // If section filter is active and doesn't match, switch back to ALL
  if (activeSection !== 'ALL' && activeSection !== code) {
    setSection('ALL');
  }

  renderOverlay();
  focusOn(x, y, 2.6);
  showInfo(num, x, y, code);
  pushRecent(num);
}

function showInfo(num, x, y, code) {
  document.getElementById('iNum').textContent = String(num).padStart(3, '0');
  const sec = document.getElementById('iSection');
  sec.innerHTML = `<span class="chip-dot" style="background:${SECTION_COLORS[code]}"></span> ${SECTION_NAMES[code]}`;

  const r = findNearestAmenity(x, y, AMENITIES.restrooms);
  const w = findNearestAmenity(x, y, AMENITIES.water);

  document.getElementById('iRest').innerHTML = r
    ? `${r.mDist}<span class="unit">M ${compass(r.item[0]-x, r.item[1]-y)}</span>`
    : '—';
  document.getElementById('iWater').innerHTML = w
    ? `${w.mDist}<span class="unit">M ${compass(w.item[0]-x, w.item[1]-y)}</span>`
    : '—';
  document.getElementById('iCoords').textContent = `${x}, ${y}`;
  infoPanel.classList.add('show');
}

function hideInfo() {
  infoPanel.classList.remove('show');
  target = null;
  renderOverlay();
}
document.getElementById('iClose').addEventListener('click', hideInfo);

function showNoResult(msg) {
  noResult.textContent = msg;
  noResult.classList.add('show');
  if (navigator.vibrate) navigator.vibrate([60, 40, 60]);
  setTimeout(() => noResult.classList.remove('show'), 2000);
}

input.addEventListener('input', (e) => {
  const v = e.target.value.replace(/\D/g, '').slice(0, 4);
  e.target.value = v;
  // Auto-search at 3+ digits if it's a valid site
  if (v.length >= 3 && SITES[v]) {
    selectSite(v);
  }
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (input.value) selectSite(input.value);
  }
});
input.addEventListener('focus', () => input.select());

/* ============ SECTIONS ============ */
const chips = document.getElementById('chips');
function setSection(code) {
  activeSection = code;
  chips.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.section === code);
  });
  if (code === 'ALL') {
    fitToScreen();
  } else {
    // Compute bounding box for that section
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const [n, d] of Object.entries(SITES)) {
      if (d[2] === code) {
        if (d[0] < minX) minX = d[0];
        if (d[0] > maxX) maxX = d[0];
        if (d[1] < minY) minY = d[1];
        if (d[1] > maxY) maxY = d[1];
      }
    }
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const rect = zone.getBoundingClientRect();
    const padding = 200;
    const w = (maxX - minX) + padding * 2;
    const h = (maxY - minY) + padding * 2;
    const sc = Math.min(rect.width / w, rect.height / h);
    focusOn(cx, cy, Math.min(sc, 2.0));
  }
}
chips.addEventListener('click', (e) => {
  const c = e.target.closest('.chip');
  if (c) setSection(c.dataset.section);
});

/* ============ GPS ============ */
const gpsBtn = document.getElementById('gpsBtn');
gpsBtn.addEventListener('click', toggleGPS);

function geoToMapPx(lat, lng) {
  const t = (GEO_BOUNDS.nw[0] - lat) / (GEO_BOUNDS.nw[0] - GEO_BOUNDS.se[0]);
  const u = (lng - GEO_BOUNDS.nw[1]) / (GEO_BOUNDS.se[1] - GEO_BOUNDS.nw[1]);
  return [u * MAP_W, t * MAP_H];
}

function toggleGPS() {
  if (gpsActive) {
    if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);
    gpsActive = false;
    gpsPos = null;
    gpsBtn.classList.remove('active');
    renderOverlay();
    return;
  }
  if (!navigator.geolocation) {
    showNoResult('GEOLOCATION UNAVAILABLE');
    return;
  }
  gpsBtn.classList.add('active');
  gpsActive = true;
  gpsWatchId = navigator.geolocation.watchPosition(
    (p) => {
      const [x, y] = geoToMapPx(p.coords.latitude, p.coords.longitude);
      gpsPos = { x, y, accuracy_m: p.coords.accuracy };
      renderOverlay();
    },
    (err) => {
      showNoResult('GPS DENIED');
      gpsBtn.classList.remove('active');
      gpsActive = false;
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

/* ============ RECENT SEARCHES ============ */
function pushRecent(num) {
  recents = [num, ...recents.filter(n => n !== num)].slice(0, 6);
  renderRecents();
}
function renderRecents() {
  const el = document.getElementById('recents');
  if (recents.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<span style="font-size:9px;color:var(--text-dim);letter-spacing:0.2em;align-self:center;padding-right:4px">RECENT:</span>` +
    recents.map(n => `<button class="recent" data-num="${n}">${n}</button>`).join('');
  el.querySelectorAll('.recent').forEach(b => {
    b.addEventListener('click', () => {
      input.value = b.dataset.num;
      selectSite(b.dataset.num);
    });
  });
}

/* ============ INIT ============ */
window.addEventListener('resize', () => {
  if (target) focusOn(target.x, target.y, scale, false);
  else fitToScreen();
});

// Prevent iOS bounce
document.body.addEventListener('touchmove', (e) => {
  if (e.target.closest('.search-zone, .info-panel, .recents, .chips')) return;
  e.preventDefault();
}, { passive: false });

// Prevent context menu on long press
zone.addEventListener('contextmenu', (e) => e.preventDefault());

// Keyboard shortcut: focus search on '/'
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== input) {
    e.preventDefault();
    input.focus();
  }
});


/* ============ PWA: load sites.json and register service worker ============ */
fetch('sites.json')
  .then(r => r.json())
  .then(data => {
    // sites.json from build_coords.py has structure {image:..., sites:{ "215": {x,y,section}, ... }}
    // Convert to compact format the app uses: { 215: [x, y, sectionCode] }
    const codeMap = { 'Meadow View': 'M', 'Marsh View': 'A', 'Marine View': 'R' };
    const compact = {};
    for (const [k, v] of Object.entries(data.sites || data)) {
      if (Array.isArray(v)) compact[k] = v;
      else compact[k] = [v.x, v.y, codeMap[v.section] || 'M'];
    }
    SITES = compact;
    console.log('Loaded', Object.keys(SITES).length, 'sites');
  })
  .catch(err => console.error('sites.json load failed', err));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW registered — offline ready'))
      .catch(e => console.error('SW failed', e));
  });
}

</script>
